name: tests

on:
  pull_request:
    branches: [main]

jobs:
  tests:
    name: 'py${{ matrix.python-version }} on ${{ matrix.os }}'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-15-intel, macos-26]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install VPLanet stack
        run: |
          python -m pip install --upgrade pip
          # vplanet ships a precompiled wheel on PyPI; install from there.
          python -m pip install vplanet
          # vspace, multi-planet, and bigplanet on PyPI are old releases that
          # diverge from the development branches vconverge is built against.
          # Install each from the @main branch of its dev repo so the integration
          # tests exercise the same APIs vconverge actually targets.
          python -m pip install \
            "vspace @ git+https://github.com/VirtualPlanetaryLaboratory/vspace.git@main" \
            "multiplanet @ git+https://github.com/VirtualPlanetaryLaboratory/multi-planet.git@main" \
            "bigplanet @ git+https://github.com/VirtualPlanetaryLaboratory/bigplanet.git@main"

      - name: Install vconverge
        run: |
          python -m pip install -e .

      - name: Install test dependencies
        run: |
          python -m pip install pytest pytest-cov pytest-timeout

      - name: Run diagnostic test
        timeout-minutes: 3
        run: |
          # First run a simple unit test to verify pytest works
          echo "Running single unit test as diagnostic..."
          python -m pytest tests/Unit/test_extract_info.py -v -s

      - name: Enable subprocess coverage
        run: |
          # Install coverage subprocess support
          echo "import coverage; coverage.process_startup()" > $(python -c "import site; print(site.getsitepackages()[0])")/coverage_subprocess.pth
          # Set environment variable for coverage configuration
          echo "COVERAGE_PROCESS_START=${{ github.workspace }}/.coveragerc" >> $GITHUB_ENV

      - name: Run tests
        timeout-minutes: 20
        run: |
          # Run all tests with verbose output, capture disabled to see subprocess output, and per-test timeout
          python -m pytest tests/ -v -s --timeout=300 --junitxml=junit/test-results-${{ matrix.os }}-${{ matrix.python-version }}.xml --cov --cov-report=xml --cov-report=term

      - name: Combine coverage data
        if: matrix.os == 'ubuntu-22.04' && matrix.python-version == '3.9'
        run: |
          # Integration tests run in-process so pytest's --cov-report=xml step
          # already emits coverage.xml. Subprocess .coverage.<pid> files only
          # appear when COVERAGE_PROCESS_START catches a child; merge them in
          # if any exist, otherwise fall through to the existing coverage.xml.
          find tests/ -name ".coverage.*" -type f -exec mv {} . \; 2>/dev/null || true
          if compgen -G ".coverage.*" > /dev/null; then
            python -m coverage combine
            python -m coverage xml
            python -m coverage report
          else
            python -m coverage report
          fi

      - name: Upload coverage to Codecov
        # Only upload from one runner to avoid redundant API calls
        if: matrix.os == 'ubuntu-22.04' && matrix.python-version == '3.9'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: ${{ matrix.os }}-py${{ matrix.python-version }}
          name: ${{ matrix.os }}-py${{ matrix.python-version }}
          fail_ci_if_error: false

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() && runner.os == 'Linux'
        with:
          files: junit/test-*.xml
          check_name: Test Results (py${{ matrix.python-version }} on ${{ matrix.os }})
